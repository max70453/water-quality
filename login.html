<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Модуль визуализации качества воды</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #f0f4f8 100%);
        }
        
        .auth-logo h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #0ea5e9;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #0369a1;
        }
        
        .auth-logo p {
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .auth-page .form-group {
            margin-bottom: 20px;
        }
        
        .auth-page .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .auth-page .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #fff;
        }
        
        .auth-page .form-group input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
            outline: none;
        }
        
        .auth-page .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }
        
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
        }
        
        .auth-link a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-link a:hover {
            text-decoration: underline;
        }
        
        .auth-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
        }
        
        .auth-success {
            color: #10b981;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-page" id="loginPage">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Мониторинг воды</h1>
                <p>Донецк и Донецкая область</p>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="loginEmail" placeholder="Введите email" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль" autocomplete="current-password">
            </div>
            <button class="btn" onclick="login()">Войти</button>
            <p class="auth-error" id="loginError"></p>
            <p class="auth-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </p>
        </div>
    </div>
    
    <script>
        let currentUser = null;

        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.textContent = 'Заполните все поля';
                return;
            }

            const users = JSON.parse(localStorage.getItem('waterQualityUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                currentUser = user;
                localStorage.setItem('waterQualityUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                errorEl.textContent = 'Неверный email или пароль';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });

        const savedUser = localStorage.getItem('waterQualityUser');
        if (savedUser) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
